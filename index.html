<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Night Funkin' Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #game-container { display: flex; justify-content: space-between; }
        #left-display, #right-display { width: 20%; background: lightgray; padding: 10px; }
        #game-area { width: 60%; background: white; padding: 10px; border: 1px solid black; }
    </style>
</head>
<body>
    <h1>Friday Night Funkin' Game</h1>
    <div id="game-container">
        <div id="left-display">
            <h2>Character Display</h2>
            <!-- Character images go here -->
        </div>
        <div id="game-area">
            <h2>Game Area</h2>
            <!-- Game logic goes here -->
            <button id="play-button">Play</button>
            <div id="score">Score: 0</div>
        </div>
        <div id="right-display">
            <h2>Mods</h2>
            <ul>
                <li>Mod 1</li>
                <li>Mod 2</li>
                <li>Mod 3</li>
                <li>Mod 4</li>
                <li>Mod 5</li>
            </ul>
        </div>
    </div>
    <audio id="music-player" controls>
        <source src="path_to_music_file.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>

    <script>
        let score = 0;
        document.getElementById('play-button').onclick = function() {
            score += 10;
            document.getElementById('score').innerText = 'Score: ' + score;
            // Additional game logic goes here
        };
        // Keyboard and mouse controls can be added here
    </script>
</body>
</html>
